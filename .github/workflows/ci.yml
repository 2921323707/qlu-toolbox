name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-windows:
    name: Windows verification
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: ".python-version"

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Python dependencies
        run: uv sync --locked

      - name: Check Python lockfile
        run: uv lock --check

      - name: Run Python tests
        run: uv run --locked python -B -m unittest discover -s tests -v

      - name: Build Vue and Electron
        run: npm run build

      - name: Build Python worker
        run: npm run build:backend

      - name: Package Windows application directory
        run: npx electron-builder --win dir --publish never
