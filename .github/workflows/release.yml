name: Build and Release

on:
  push:
    tags: ["v*.*.*", "v*.*.*-*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: ".python-version"

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Python dependencies
        run: uv sync --locked

      - name: Install Playwright browsers
        run: uv run playwright install chromium

      - name: Build
        run: npm run dist

      - name: Create shortcut
        shell: pwsh
        run: |
          $exe = Get-ChildItem release\win-unpacked -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { throw "No .exe found in release\win-unpacked" }
          $ws = New-Object -ComObject WScript.Shell
          $lnk = $ws.CreateShortcut("$($exe.Directory)\$($exe.BaseName).lnk")
          $lnk.TargetPath = ".\$($exe.Name)"
          $lnk.Save()

      - name: Package as zip
        run: |
          $version = "${{ github.ref_name }}"
          Rename-Item release\win-unpacked QLUToolbox
          Compress-Archive -Path release\QLUToolbox -DestinationPath "QLUToolbox_$version.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: QLUToolbox_${{ github.ref_name }}.zip
          generate_release_notes: true
